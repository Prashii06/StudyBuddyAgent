steps:
  # 1. Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - "-t"
      - "gcr.io/$PROJECT_ID/smartdesk-phase1:$COMMIT_SHA"
      - "."

  # 2. Push to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "gcr.io/$PROJECT_ID/smartdesk-phase1:$COMMIT_SHA"

  # 3. Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - smartdesk-phase1
      - "--image=gcr.io/$PROJECT_ID/smartdesk-phase1:$COMMIT_SHA"
      - "--platform=managed"
      - "--region=us-central1"
      - "--allow-unauthenticated"
      - "--memory=512Mi"
      - "--timeout=30"
      - "--set-env-vars=GEMINI_API_KEY=$$GEMINI_API_KEY"
    secretEnv:
      - GEMINI_API_KEY

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/GEMINI_API_KEY/versions/latest
      env: GEMINI_API_KEY

images:
  - "gcr.io/$PROJECT_ID/smartdesk-phase1:$COMMIT_SHA"